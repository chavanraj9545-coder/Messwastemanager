services:
  - type: web
    name: mess-waste-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # User must set this in Render Dashboard
      - key: JWT_SECRET_KEY
        value: mess-waste-management-super-secret-key-2024
      - key: FRONTEND_URL_FIREBASE
        value: https://mess-waste-manager-v2-12345.web.app
      - key: FRONTEND_URL_NETLIFY
        value: https://mess-waste-ai-mgr.netlify.app
      - key: ALLOW_CORS_ALL
        value: "true"
