services:
  - type: web
    name: mess-waste-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard
      - key: JWT_SECRET_KEY
        sync: false # Set this in Render Dashboard
      - key: FRONTEND_URL_FIREBASE
        value: https://mess-waste-manager-v2-12345.web.app
      - key: FRONTEND_URL_NETLIFY
        value: https://mess-waste-ai-mgr.netlify.app
      - key: ALLOW_CORS_ALL
        value: "true"

  - type: static
    name: mess-waste-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mess-waste-backend.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 634551849972-kg179vttsp7kbnucdl88umsnle3ingju.apps.googleusercontent.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://mess-waste-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
